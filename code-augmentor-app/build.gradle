plugins {
	id 'java'
    id 'application'
}

group = "com.aaronicsubstances"
version = "1.0-SNAPSHOT"

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}
compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'

ext {
    mainClassName = "com.aaronicsubstances.code.augmentor.app.Main"
}

application {
    mainClassName = project.mainClassName
    applicationDefaultJvmArgs = [ '-Dapp.name=' + applicationName ]
}

dependencies {
	implementation project(':code-augmentor-core')
	implementation project(':code-augmentor-ant')
    
	implementation 'commons-cli:commons-cli:1.3.1'
    
    // use version required by - org.codehaus.groovy:groovy-ant:3.0.3
	implementation 'org.apache.ant:ant:1.10.7'
	
	testImplementation 'org.testng:testng:7.1.0'
}

test {
	useTestNG()
}

task('publishCoreDependency', type: Exec) {
    def cmdPlusArgs = []
    if (System.getProperty("os.name") =~ /(?i)win/) {
        cmdPlusArgs << 'cmd' << '/c'
    }
    cmdPlusArgs << 'gradlew'
    cmdPlusArgs << ':code-augmentor-core:build'
    cmdPlusArgs << ':code-augmentor-core:publishToMavenLocal'
    commandLine cmdPlusArgs
    workingDir '..'
}

task('alltests', type: JavaExec, dependsOn: [ 'publishCoreDependency', 'build' ]) {
    def psep = File.separator
    args = [ "-f", "src${psep}test${psep}projects${psep}basic${psep}build.xml" ]
    main = project.mainClassName
    classpath(sourceSets.main.runtimeClasspath)
    enableAssertions = true
}